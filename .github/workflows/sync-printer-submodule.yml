name: Sync duplex-scan-for-any-printer Submodule

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if no changes'
        required: false
        default: 'false'
        type: boolean
  repository_dispatch:
    types: [printer-submodule-update]

jobs:
  sync-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register submodule
        run: git submodule init duplex-scan-for-any-printer

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update duplex-scan-for-any-printer submodule
        id: update
        run: |
          git submodule update --remote duplex-scan-for-any-printer
          if git diff --staged --quiet && git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in submodule."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            NEW_COMMIT=$(git -C duplex-scan-for-any-printer rev-parse --short HEAD)
            echo "new_commit=$NEW_COMMIT" >> $GITHUB_OUTPUT
            echo "Submodule updated to $NEW_COMMIT"
          fi

      - name: Commit and push submodule update
        if: steps.update.outputs.changed == 'true'
        run: |
          git add duplex-scan-for-any-printer
          git commit -m "chore: update duplex-scan-for-any-printer submodule to ${{ steps.update.outputs.new_commit }}"
          git push
